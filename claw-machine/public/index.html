<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 Claw Machine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>CLAW MACHINE</h1>
      <div id="scoreboard">
        <span>SCORE: <strong id="score">0</strong></span>
        <span>COINS: <strong id="coins">5</strong></span>
        <span>WINS: <strong id="wins">0</strong></span>
      </div>
    </header>

    <div id="game-wrapper">
      <div id="cabinet">
        <canvas id="gameCanvas" width="500" height="520"></canvas>
        <div id="glass-effect"></div>
      </div>

      <div id="controls-panel">
        <div id="instructions">
          <h3>HOW TO PLAY</h3>
          <p>← → Move claw left/right</p>
          <p>SPACE / DROP — Release claw</p>
          <p>Grab prizes before coins run out!</p>
        </div>

        <div id="btn-group">
          <button id="btn-left" class="ctrl-btn">◀ LEFT</button>
          <button id="btn-drop" class="ctrl-btn drop">DROP</button>
          <button id="btn-right" class="ctrl-btn">RIGHT ▶</button>
        </div>

        <button id="btn-insert" class="ctrl-btn insert">INSERT COIN (+5)</button>

      </div>
    </div>

    <div id="message-overlay" class="hidden">
      <div id="message-box">
        <div id="message-text"></div>
        <button id="message-ok">OK</button>
      </div>
    </div>
  </div>

  <script src="physics.js"></script>
  <script src="game.js"></script>
</body>
</html>
