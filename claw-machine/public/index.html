<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎮 3D Claw Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Rajdhani',sans-serif;color:#fff;user-select:none;}
#canvas3d{display:block;width:100vw;height:100vh;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10;}
.hud-top{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:linear-gradient(180deg,rgba(0,0,0,0.85) 0%,transparent 100%);}
.game-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:4px;color:#00f5ff;text-shadow:0 0 20px #00f5ff,0 0 40px #00f5ff55;}
.stats{display:flex;gap:28px;}
.stat-item{text-align:center;}
.stat-label{font-size:10px;letter-spacing:2px;color:#888;display:block;}
.stat-value{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:#ffe600;text-shadow:0 0 10px #ffe600;}

/* Controls */
#controls{position:fixed;bottom:0;left:0;right:0;pointer-events:none;z-index:10;}
.controls-inner{display:flex;justify-content:space-between;align-items:flex-end;padding:16px 24px;background:linear-gradient(0deg,rgba(0,0,0,0.9) 0%,transparent 100%);}
.ctrl-group{display:flex;gap:10px;pointer-events:all;}
.btn{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;border:2px solid;border-radius:6px;padding:10px 18px;cursor:pointer;transition:all 0.15s;background:rgba(0,0,0,0.7);}
.btn-move{color:#00f5ff;border-color:#00f5ff;text-shadow:0 0 8px #00f5ff;}
.btn-move:hover,.btn-move:active{background:#00f5ff22;box-shadow:0 0 16px #00f5ff;}
.btn-drop{color:#ff007f;border-color:#ff007f;text-shadow:0 0 8px #ff007f;padding:10px 28px;}
.btn-drop:hover,.btn-drop:active{background:#ff007f22;box-shadow:0 0 16px #ff007f;}
.btn-coin{color:#ffe600;border-color:#ffe600;text-shadow:0 0 8px #ffe600;}
.btn-coin:hover,.btn-coin:active{background:#ffe60022;box-shadow:0 0 16px #ffe600;}
.hint{color:#555;font-size:11px;letter-spacing:1px;text-align:center;}

/* Message overlay */
#msg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity 0.3s;}
#msg-overlay.show{opacity:1;pointer-events:all;}
#msg-box{background:linear-gradient(135deg,#0a0a1a,#111130);border:2px solid #00f5ff;border-radius:16px;padding:36px 48px;text-align:center;box-shadow:0 0 60px #00f5ff33,inset 0 0 40px #00001a;}
#msg-title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#00f5ff;text-shadow:0 0 20px #00f5ff;margin-bottom:10px;}
#msg-body{font-size:16px;color:#aaa;line-height:1.7;margin-bottom:24px;white-space:pre-line;}
#msg-ok{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:3px;color:#ff007f;border:2px solid #ff007f;background:transparent;border-radius:8px;padding:10px 32px;cursor:pointer;transition:all 0.2s;}
#msg-ok:hover{background:#ff007f22;box-shadow:0 0 20px #ff007f;}

/* Win flash */
#win-flash{position:fixed;inset:0;background:#ffe600;pointer-events:none;z-index:40;opacity:0;transition:opacity 0.1s;}

/* Phase indicator */
#phase-bar{position:fixed;top:70px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:#333;transition:color 0.3s;}
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<div id="hud">
  <div class="hud-top">
    <div class="game-title">CLAW MACHINE</div>
    <div class="stats">
      <div class="stat-item"><span class="stat-label">SCORE</span><span class="stat-value" id="score">0</span></div>
      <div class="stat-item"><span class="stat-label">COINS</span><span class="stat-value" id="coins">5</span></div>
      <div class="stat-item"><span class="stat-label">WINS</span><span class="stat-value" id="wins">0</span></div>
    </div>
  </div>
</div>

<div id="phase-bar" id="phase-bar">[ IDLE ]</div>

<div id="controls">
  <div class="controls-inner">
    <div class="ctrl-group">
      <button class="btn btn-move" id="btn-left">◀ LEFT</button>
      <button class="btn btn-move" id="btn-back">▲ BACK</button>
      <button class="btn btn-move" id="btn-fwd">▼ FWD</button>
      <button class="btn btn-move" id="btn-right">RIGHT ▶</button>
    </div>
    <div class="ctrl-group" style="flex-direction:column;align-items:center;gap:8px;">
      <button class="btn btn-drop" id="btn-drop">⬇ DROP</button>
      <button class="btn btn-coin" id="btn-coin">🪙 INSERT COIN</button>
    </div>
  </div>
</div>

<div id="msg-overlay">
  <div id="msg-box">
    <div id="msg-title">🎮 CLAW MACHINE</div>
    <div id="msg-body">Move claw: ← → ↑ ↓ Arrow Keys\nDrop claw: SPACE\n\nGrab prizes & aim for\nthe CHUTE on the right!\n\nGood luck!</div>
    <button id="msg-ok">PLAY!</button>
  </div>
</div>

<div id="win-flash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  3D CLAW MACHINE — Three.js
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x000005);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000010, 0.04);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 6, 14);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── LIGHTS ───────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x111133, 1.5);
scene.add(ambientLight);

const topLight = new THREE.PointLight(0x00f5ff, 3, 20);
topLight.position.set(0, 8, 0);
topLight.castShadow = true;
scene.add(topLight);

const pinkLight = new THREE.PointLight(0xff007f, 2, 15);
pinkLight.position.set(4, 2, 0);
scene.add(pinkLight);

const yellowLight = new THREE.PointLight(0xffe600, 1.5, 12);
yellowLight.position.set(-4, 1, 3);
scene.add(yellowLight);

// ── CABINET ──────────────────────────────────────────
const CAB_W = 8, CAB_H = 7, CAB_D = 7;
const FLOOR_Y = -CAB_H / 2;
const RAIL_Y  =  CAB_H / 2 - 0.6;

function makeGlassPanel(w, h, rx, ry, rz, px, py, pz) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0x88ddff,
    transparent: true,
    opacity: 0.08,
    roughness: 0,
    metalness: 0.1,
    side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.set(rx, ry, rz);
  mesh.position.set(px, py, pz);
  scene.add(mesh);
}

// Glass walls
makeGlassPanel(CAB_W, CAB_H, 0, 0, 0, 0, 0,  CAB_D/2);   // front
makeGlassPanel(CAB_W, CAB_H, 0, 0, 0, 0, 0, -CAB_D/2);   // back
makeGlassPanel(CAB_D, CAB_H, 0, Math.PI/2, 0, -CAB_W/2, 0, 0); // left
makeGlassPanel(CAB_D, CAB_H, 0, Math.PI/2, 0,  CAB_W/2, 0, 0); // right

// Frame edges (neon)
function makeEdge(x1,y1,z1,x2,y2,z2,color){
  const pts=[new THREE.Vector3(x1,y1,z1),new THREE.Vector3(x2,y2,z2)];
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color,linewidth:2});
  scene.add(new THREE.Line(geo,mat));
}
const EW=CAB_W/2, EH=CAB_H/2, ED=CAB_D/2;
const ec=0x00f5ff;
// vertical edges
makeEdge(-EW,-EH,-ED,-EW, EH,-ED,ec); makeEdge( EW,-EH,-ED, EW, EH,-ED,ec);
makeEdge(-EW,-EH, ED,-EW, EH, ED,ec); makeEdge( EW,-EH, ED, EW, EH, ED,ec);
// top edges
makeEdge(-EW,EH,-ED, EW,EH,-ED,ec); makeEdge(-EW,EH, ED, EW,EH, ED,ec);
makeEdge(-EW,EH,-ED,-EW,EH, ED,ec); makeEdge( EW,EH,-ED, EW,EH, ED,ec);
// bottom edges
makeEdge(-EW,-EH,-ED, EW,-EH,-ED,ec); makeEdge(-EW,-EH, ED, EW,-EH, ED,ec);
makeEdge(-EW,-EH,-ED,-EW,-EH, ED,ec); makeEdge( EW,-EH,-ED, EW,-EH, ED,ec);

// Floor
const floorGeo = new THREE.PlaneGeometry(CAB_W - 0.1, CAB_D - 0.1);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a22, roughness: 0.8 });
const floorMesh = new THREE.Mesh(floorGeo, floorMat);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.position.y = FLOOR_Y;
floorMesh.receiveShadow = true;
scene.add(floorMesh);

// Grid on floor
const gridHelper = new THREE.GridHelper(CAB_W - 0.2, 8, 0x00f5ff11, 0x00f5ff11);
gridHelper.position.y = FLOOR_Y + 0.01;
scene.add(gridHelper);

// Rail
const railGeo = new THREE.BoxGeometry(CAB_W - 0.4, 0.15, 0.15);
const railMat = new THREE.MeshStandardMaterial({ color: 0x00f5ff, emissive: 0x00f5ff, emissiveIntensity: 0.5 });
const railMeshX = new THREE.Mesh(railGeo, railMat);
railMeshX.position.set(0, RAIL_Y, 0);
scene.add(railMeshX);

const railGeoZ = new THREE.BoxGeometry(0.15, 0.15, CAB_D - 0.4);
const railMeshZ = new THREE.Mesh(railGeoZ, railMat.clone());

// Chute
const CHUTE_X = CAB_W / 2 - 0.8;
const chuteGeo = new THREE.BoxGeometry(1.4, 2, 1.4);
const chuteMat = new THREE.MeshStandardMaterial({ color: 0xff007f, emissive: 0xff007f, emissiveIntensity: 0.3, transparent: true, opacity: 0.5 });
const chuteMesh = new THREE.Mesh(chuteGeo, chuteMat);
chuteMesh.position.set(CHUTE_X, FLOOR_Y + 1, 0);
scene.add(chuteMesh);

// Chute label light
const chuteLight = new THREE.PointLight(0xff007f, 2, 3);
chuteLight.position.set(CHUTE_X, FLOOR_Y + 2.5, 0);
scene.add(chuteLight);

// ── CLAW ─────────────────────────────────────────────
const clawGroup = new THREE.Group();
scene.add(clawGroup);

// Claw body (pulley)
const bodyGeo = new THREE.BoxGeometry(0.9, 0.4, 0.9);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a1a4a, emissive: 0x00f5ff, emissiveIntensity: 0.2, metalness: 0.8, roughness: 0.2 });
const clawBody = new THREE.Mesh(bodyGeo, bodyMat);
clawGroup.add(clawBody);

// Claw fingers (3 fingers)
const fingerMat = new THREE.MeshStandardMaterial({ color: 0x00f5ff, emissive: 0x00f5ff, emissiveIntensity: 0.4, metalness: 0.9, roughness: 0.1 });
const fingers = [];
const fingerAngles = [0, Math.PI * 2 / 3, Math.PI * 4 / 3];

fingerAngles.forEach(angle => {
  const fingerGroup = new THREE.Group();
  const segGeo = new THREE.CylinderGeometry(0.05, 0.04, 0.7, 6);
  const seg = new THREE.Mesh(segGeo, fingerMat);
  seg.position.y = -0.35;
  fingerGroup.add(seg);
  const tipGeo = new THREE.SphereGeometry(0.07, 6, 6);
  const tip = new THREE.Mesh(tipGeo, fingerMat);
  tip.position.y = -0.7;
  fingerGroup.add(tip);
  fingerGroup.position.set(Math.cos(angle) * 0.3, -0.2, Math.sin(angle) * 0.3);
  fingerGroup.rotation.x = 0.5; // open
  fingerGroup.userData.baseAngle = angle;
  clawGroup.add(fingerGroup);
  fingers.push(fingerGroup);
});

// Rope
const ropePoints = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 2, 0)];
const ropeGeo = new THREE.BufferGeometry().setFromPoints(ropePoints);
const ropeMat = new THREE.LineBasicMaterial({ color: 0x888888 });
const ropeLine = new THREE.Line(ropeGeo, ropeMat);
scene.add(ropeLine);

// Claw state
const clawState = {
  x: 0, z: 0,
  y: RAIL_Y - 0.3,
  baseY: RAIL_Y - 0.3,
  ropeLen: 0,
  maxRope: CAB_H - 1.5,
  speed: 0.06,
  dropSpeed: 0.07,
  returnSpeed: 0.09,
  open: true,
  gripForce: 12,
};

function setClawOpen(open) {
  clawState.open = open;
  fingers.forEach((fg, i) => {
    fg.rotation.x = open ? 0.5 : 0.05;
  });
  fingerMat.emissive.set(open ? 0x00f5ff : 0xff007f);
  bodyMat.emissive.set(open ? 0x00f5ff : 0xff007f);
}

// ── PRIZES ───────────────────────────────────────────
const PRIZE_EMOJIS = ['🐻','👽','🎵','🎮','💎','🐙','🚀','🤖','💂‍♂️','🌑'];
const PRIZE_COLORS = [0xc8860a, 0x6bff44, 0x627898, 0x334455, 0x00cfff, 0xe78d25, 0xff4500, 0x9edfff, 0xff88cc, 0x7125e7];
const PRIZE_VALUES = [11, 25, 15, 35, 45, 8, 25, 23, 12, 50];

let prizeObjects = [];
let grabbedPrize = null;
let pendulumAngle = 0, pendulumVel = 0;

function makeEmojiTexture(emoji) {
  const size = 128;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const cx = c.getContext('2d');
  cx.font = `${size * 0.7}px serif`;
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(emoji, size / 2, size / 2);
  return new THREE.CanvasTexture(c);
}

function spawnPrizes() {
  prizeObjects.forEach(p => scene.remove(p.mesh));
  prizeObjects = [];

  const count = 12 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const idx = Math.floor(Math.random() * PRIZE_EMOJIS.length);
    const tex = makeEmojiTexture(PRIZE_EMOJIS[idx]);
    const mat = new THREE.SpriteMaterial({ map: tex });
    const sprite = new THREE.Sprite(mat);
    const scale = 0.7 + Math.random() * 0.4;
    sprite.scale.set(scale, scale, scale);
    sprite.position.set(
      (Math.random() - 0.5) * (CAB_W - 2),
      FLOOR_Y + scale / 2 + Math.random() * 1.5,
      (Math.random() - 0.5) * (CAB_D - 2)
    );
    sprite.castShadow = true;
    scene.add(sprite);
    prizeObjects.push({
      mesh: sprite,
      emoji: PRIZE_EMOJIS[idx],
      color: PRIZE_COLORS[idx],
      value: PRIZE_VALUES[idx],
      mass: 0.4 + Math.random() * 0.8,
      vx: 0, vy: 0, vz: 0,
      collected: false,
      scale,
    });
  }
}

// ── PARTICLES ─────────────────────────────────────────
let particles3d = [];

function spawnParticles3d(x, y, z, color, count = 16) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.06, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    scene.add(mesh);
    const speed = 0.08 + Math.random() * 0.15;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    particles3d.push({
      mesh,
      vx: Math.sin(phi) * Math.cos(theta) * speed,
      vy: Math.sin(phi) * Math.sin(theta) * speed + 0.05,
      vz: Math.cos(phi) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.02,
    });
  }
}

function updateParticles3d() {
  for (let p of particles3d) {
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    p.vy -= 0.004;
    p.life -= p.decay;
    p.mesh.material.opacity = p.life;
    p.mesh.material.transparent = true;
    p.mesh.scale.setScalar(p.life);
  }
  const dead = particles3d.filter(p => p.life <= 0);
  dead.forEach(p => scene.remove(p.mesh));
  particles3d = particles3d.filter(p => p.life > 0);
}

// ── GAME STATE ────────────────────────────────────────
const game = {
  score: 0, coins: 5, wins: 0,
  phase: 'idle', // idle|dropping|grabbing|returning|releasing
};

function updateUI() {
  document.getElementById('score').textContent = game.score;
  document.getElementById('coins').textContent = game.coins;
  document.getElementById('wins').textContent = game.wins;
  const phaseEl = document.getElementById('phase-bar');
  if (phaseEl) phaseEl.textContent = `[ ${game.phase.toUpperCase()} ]`;
}

// ── INPUT ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); tryDrop(); }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function holdBtn(id, code) {
  const el = document.getElementById(id);
  el.addEventListener('mousedown',   () => keys[code] = true);
  el.addEventListener('mouseup',     () => keys[code] = false);
  el.addEventListener('mouseleave',  () => keys[code] = false);
  el.addEventListener('touchstart',  e => { e.preventDefault(); keys[code] = true; });
  el.addEventListener('touchend',    () => keys[code] = false);
}
holdBtn('btn-left',  'ArrowLeft');
holdBtn('btn-right', 'ArrowRight');
holdBtn('btn-back',  'ArrowUp');
holdBtn('btn-fwd',   'ArrowDown');
document.getElementById('btn-drop').addEventListener('click', tryDrop);
document.getElementById('btn-coin').addEventListener('click', () => {
  game.coins += 5; updateUI();
  showMsg('🪙 +5 COINS', 'Inserted!', 700);
});

function tryDrop() {
  if (game.phase === 'idle' && game.coins > 0) {
    game.coins--;
    updateUI();
    game.phase = 'dropping';
    setClawOpen(true);
    grabbedPrize = null;
  }
}

// ── UPDATE LOOP ───────────────────────────────────────
function updateGame() {
  // Move claw horizontally in idle
  if (game.phase === 'idle') {
    if (keys['ArrowLeft'])  clawState.x = Math.max(-(CAB_W/2 - 0.8), clawState.x - clawState.speed);
    if (keys['ArrowRight']) clawState.x = Math.min( (CAB_W/2 - 0.8), clawState.x + clawState.speed);
    if (keys['ArrowUp'])    clawState.z = Math.max(-(CAB_D/2 - 0.8), clawState.z - clawState.speed);
    if (keys['ArrowDown'])  clawState.z = Math.min( (CAB_D/2 - 0.8), clawState.z + clawState.speed);
    clawState.ropeLen = 0;
    clawState.y = clawState.baseY;
  }

  else if (game.phase === 'dropping') {
    clawState.ropeLen += clawState.dropSpeed;
    clawState.y = clawState.baseY - clawState.ropeLen;

    const cy = clawState.y;

    if (cy <= FLOOR_Y + 0.5) {
      setClawOpen(false);
      game.phase = 'grabbing';
      setTimeout(() => game.phase = 'returning', 350);
    } else {
      // Check prize collision
      for (let p of prizeObjects) {
        if (p.collected) continue;
        const dx = p.mesh.position.x - clawState.x;
        const dy = p.mesh.position.y - cy;
        const dz = p.mesh.position.z - clawState.z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if (dist < p.scale * 0.7) {
          setClawOpen(false);
          game.phase = 'grabbing';
          // Grip check
          if (clawState.gripForce > p.mass * 8) {
            grabbedPrize = p;
            p.vx = 0; p.vy = 0; p.vz = 0;
            spawnParticles3d(p.mesh.position.x, p.mesh.position.y, p.mesh.position.z, p.color);
          }
          setTimeout(() => game.phase = 'returning', 350);
          break;
        }
      }
    }
  }

  else if (game.phase === 'returning') {
    clawState.ropeLen -= clawState.returnSpeed;
    clawState.y = clawState.baseY - clawState.ropeLen;

    if (grabbedPrize) {
      // Pendulum swing
      const gravity = 0.003;
      pendulumVel += (-gravity * Math.sin(pendulumAngle));
      pendulumVel *= 0.97;
      pendulumAngle += pendulumVel;
      const pLen = 0.8;
      grabbedPrize.mesh.position.x = clawState.x + Math.sin(pendulumAngle) * pLen;
      grabbedPrize.mesh.position.y = clawState.y - 0.6;
      grabbedPrize.mesh.position.z = clawState.z;
    }

    if (clawState.ropeLen <= 0) {
      clawState.ropeLen = 0;
      clawState.y = clawState.baseY;
      game.phase = 'releasing';
      setClawOpen(true);
      pendulumAngle = 0;
      pendulumVel = 0;
    }
  }

  else if (game.phase === 'releasing') {
    if (grabbedPrize) {
      grabbedPrize.vx = pendulumVel * 0.8;
      grabbedPrize.vy = 0.02;
      grabbedPrize.vz = 0;
      checkWin(grabbedPrize);
      grabbedPrize = null;
    }
    game.phase = 'idle';
    if (game.coins === 0) {
      setTimeout(() => showMsg('GAME OVER', 'No coins left!\nInsert more coins to continue.'), 600);
    }
  }

  // Update claw position
  clawGroup.position.set(clawState.x, clawState.y, clawState.z);

  // Update rope
  const ropeStart = new THREE.Vector3(clawState.x, clawState.baseY, clawState.z);
  const ropeEnd   = new THREE.Vector3(clawState.x, clawState.y, clawState.z);
  ropeGeo.setFromPoints([ropeStart, ropeEnd]);

  // Update prize physics (non-grabbed)
  for (let p of prizeObjects) {
    if (p.collected || p === grabbedPrize) continue;
    p.vy -= 0.005; // gravity
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    // Floor
    if (p.mesh.position.y < FLOOR_Y + p.scale / 2) {
      p.mesh.position.y = FLOOR_Y + p.scale / 2;
      p.vy *= -0.3;
      p.vx *= 0.85;
      p.vz *= 0.85;
    }
    // Walls
    if (p.mesh.position.x < -(CAB_W/2-0.5)) { p.mesh.position.x = -(CAB_W/2-0.5); p.vx *= -0.5; }
    if (p.mesh.position.x >  (CAB_W/2-0.5)) { p.mesh.position.x =  (CAB_W/2-0.5); p.vx *= -0.5; }
    if (p.mesh.position.z < -(CAB_D/2-0.5)) { p.mesh.position.z = -(CAB_D/2-0.5); p.vz *= -0.5; }
    if (p.mesh.position.z >  (CAB_D/2-0.5)) { p.mesh.position.z =  (CAB_D/2-0.5); p.vz *= -0.5; }
  }

  // Animate lights
  const t = Date.now() * 0.001;
  topLight.intensity = 2.5 + Math.sin(t * 2) * 0.5;
  pinkLight.position.x = 3 + Math.sin(t * 0.7) * 1.5;
  chuteLight.intensity = 1.5 + Math.sin(t * 3) * 0.5;

  updateParticles3d();
}

function checkWin(prize) {
  setTimeout(() => {
    const px = prize.mesh.position.x;
    const pz = prize.mesh.position.z;
    if (Math.abs(px - CHUTE_X) < 1.2 && Math.abs(pz) < 1.2) {
      prize.collected = true;
      game.score += prize.value;
      game.wins++;
      updateUI();
      spawnParticles3d(prize.mesh.position.x, prize.mesh.position.y, prize.mesh.position.z, 0xffe600, 30);
      prize.mesh.visible = false;
      showMsg(`🏆 YOU GOT IT!`, `${prize.emoji}  +${prize.value} pts`, 2000);
      winFlash();
    }
  }, 900);
}

function winFlash() {
  const el = document.getElementById('win-flash');
  el.style.opacity = '0.6';
  setTimeout(() => el.style.opacity = '0', 150);
}

// ── MESSAGES ──────────────────────────────────────────
let msgTimeout = null;
function showMsg(title, body = '', autoClose = 0) {
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-body').textContent = body;
  document.getElementById('msg-overlay').classList.add('show');
  if (autoClose > 0) {
    if (msgTimeout) clearTimeout(msgTimeout);
    msgTimeout = setTimeout(hideMsg, autoClose);
  }
}
function hideMsg() {
  document.getElementById('msg-overlay').classList.remove('show');
}
document.getElementById('msg-ok').addEventListener('click', hideMsg);

// ── RENDER LOOP ───────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  updateGame();
  renderer.render(scene, camera);
}

// ── INIT ──────────────────────────────────────────────
spawnPrizes();
updateUI();
animate();

setTimeout(() => {
  showMsg('🎮 3D CLAW MACHINE', 'Move claw: ← → ↑ ↓ Arrow Keys\nDrop claw: SPACE or DROP button\n\nGrab prizes & drop them\ninto the glowing CHUTE!\n\nGood luck! 🕹️');
}, 400);
</script>
